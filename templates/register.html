<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap (fast + professional UI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow-lg" style="width: 380px;">
    
    <h3 class="text-center mb-3">Create Account 🚀</h3>
    <p class="text-center text-muted">Join us today</p>

    <form method="POST">
        <input class="form-control mb-3" name="name" placeholder="Full Name" required>
        
        <input class="form-control mb-3" type="email" name="email" placeholder="Email Address" required>
        
        <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
        
        <button class="btn btn-success w-100">Register</button>
    </form>

    <p class="text-center mt-3">
        Already have an account? 
        <a href="/login">Login</a>
    </p>

</div>

</body>
</html>
